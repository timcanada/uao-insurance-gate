<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Insurance Gate at Hormuz — Slide Deck</title>
<style>
  :root{--navy:#0e1b2c;--navy2:#13243a;--panel:#0a1626;--gold:#c9a44c;--gold2:#e6c75a;--line:#1d2e44;--txt:#f5f1e6;--mut:#8a9bb0;}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{background:var(--navy);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}
  .topbar{display:flex;align-items:center;gap:10px;padding:9px 14px;background:linear-gradient(180deg,#13243a,#0e1b2c);border-bottom:1px solid var(--line);flex:0 0 auto;z-index:5}
  .ttl{font-size:13px;font-weight:700;letter-spacing:.2px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .ttl small{display:block;font-weight:500;color:var(--mut);font-size:10.5px;letter-spacing:.4px;text-transform:uppercase}
  .btn{background:#16314a;border:1px solid var(--line);color:var(--txt);width:34px;height:34px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:.15s;flex:0 0 auto}
  .btn:hover{background:#1d3e5e;border-color:#2a5076;color:var(--gold2)}
  .btn.on{background:var(--gold);color:var(--navy);border-color:var(--gold)}
  .btn svg{width:17px;height:17px}
  .stage{position:relative;flex:1 1 auto;overflow:hidden;perspective:2200px;background:radial-gradient(120% 100% at 50% 0%,#15263d,#0a1626 70%);touch-action:none}
  .panwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;will-change:transform}
  .zoomwrap{will-change:transform;transition:transform .12s ease-out;transform-origin:center center}
  .flip{position:relative;transform-style:preserve-3d;transition:transform .62s cubic-bezier(.4,.05,.2,1);will-change:transform}
  .face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;display:flex;align-items:center;justify-content:center}
  .face img{max-width:min(94vw,820px);max-height:78vh;object-fit:contain;box-shadow:0 18px 50px rgba(0,0,0,.6),0 2px 0 rgba(255,255,255,.04);border-radius:3px;background:#fff;user-select:none;-webkit-user-drag:none;pointer-events:none}
  .face.back{transform:rotateY(180deg)}
  .edge{position:absolute;top:0;bottom:0;width:30%;z-index:3;cursor:pointer}
  .edge.l{left:0}.edge.r{right:0}
  .edge:hover+.hint,.edge:hover~.hint{}
  .pageno{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(8,16,26,.78);border:1px solid var(--line);color:var(--mut);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;backdrop-filter:blur(6px);z-index:4;letter-spacing:.3px}
  .pageno b{color:var(--gold2)}
  .prog{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold2));z-index:4;transition:width .4s}
  .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:1}
  .spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .thumbs{flex:0 0 auto;background:#0a1626;border-top:1px solid var(--line);display:none;overflow-x:auto;overflow-y:hidden;padding:9px 10px;white-space:nowrap;scroll-behavior:smooth}
  .thumbs.show{display:block}
  .thumbs img{display:inline-block;height:74px;width:auto;margin:0 5px;border-radius:5px;border:2px solid transparent;cursor:pointer;opacity:.6;transition:.15s;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .thumbs img:hover{opacity:1}
  .thumbs img.act{border-color:var(--gold);opacity:1}
  .hint{position:absolute;top:50%;transform:translateY(-50%);color:rgba(245,241,230,.35);font-size:26px;z-index:4;pointer-events:none;opacity:0;transition:.2s}
  .stage:hover .hint{opacity:1}
  .hint.l{left:14px}.hint.r{right:14px}
</style>
</head>
<body>
<div class="topbar">
  <div class="ttl">The Insurance Gate at Hormuz — Slide Deck<small>UAO Research · Interactive reader</small></div>
  <button class="btn" id="tThumbs" title="Thumbnails (T)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></button>
  <button class="btn" id="zOut" title="Zoom out (-)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M8 11h6M21 21l-4.3-4.3"/></svg></button>
  <button class="btn" id="zIn" title="Zoom in (+)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M11 8v6M8 11h6M21 21l-4.3-4.3"/></svg></button>
  <button class="btn" id="fit" title="Fit page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
  <button class="btn" id="fs" title="Fullscreen (F)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg></button>
  <a class="btn" id="dl" href="https://storage.ghost.io/c/f6/9c/f69cdeb4-cfe5-4393-a9d8-5769f759a132/content/files/2026/07/The_Insurance_Gate_at_Hormuz-1.pptx" download target="_blank" rel="noopener" title="Download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg></a>
</div>
<div class="stage" id="stage">
  <div class="loader" id="ld"><div class="spin"></div></div>
  <div class="edge l" id="edgeL"></div>
  <div class="edge r" id="edgeR"></div>
  <span class="hint l">‹</span><span class="hint r">›</span>
  <div class="panwrap" id="pan"><div class="zoomwrap" id="zw"><div class="flip" id="flip">
    <div class="face front" id="front"><img id="fImg"></div>
    <div class="face back" id="back"><img id="bImg"></div>
  </div></div></div>
  <div class="pageno"><b id="cur">1</b> / <span id="tot">25</span></div>
  <div class="prog" id="prog"></div>
</div>
<div class="thumbs" id="thumbs"></div>
<script>
const PAGES=["assets/pptx-slide-01.jpg", "assets/pptx-slide-02.jpg", "assets/pptx-slide-03.jpg", "assets/pptx-slide-04.jpg", "assets/pptx-slide-05.jpg", "assets/pptx-slide-06.jpg", "assets/pptx-slide-07.jpg", "assets/pptx-slide-08.jpg", "assets/pptx-slide-09.jpg", "assets/pptx-slide-10.jpg", "assets/pptx-slide-11.jpg", "assets/pptx-slide-12.jpg", "assets/pptx-slide-13.jpg", "assets/pptx-slide-14.jpg", "assets/pptx-slide-15.jpg", "assets/pptx-slide-16.jpg", "assets/pptx-slide-17.jpg", "assets/pptx-slide-18.jpg", "assets/pptx-slide-19.jpg", "assets/pptx-slide-20.jpg", "assets/pptx-slide-21.jpg", "assets/pptx-slide-22.jpg", "assets/pptx-slide-23.jpg", "assets/pptx-slide-24.jpg", "assets/pptx-slide-25.jpg"];
let i=0, flipping=false, scale=1, panX=0, panY=0, drag=null;
const stage=document.getElementById('stage'),pan=document.getElementById('pan'),zw=document.getElementById('zw'),
 flip=document.getElementById('flip'),fImg=document.getElementById('fImg'),bImg=document.getElementById('bImg'),
 cur=document.getElementById('cur'),tot=document.getElementById('tot'),prog=document.getElementById('prog'),
 ld=document.getElementById('ld'),thumbs=document.getElementById('thumbs');
tot.textContent=PAGES.length;
function loadThumbs(){thumbs.innerHTML='';PAGES.forEach((p,idx)=>{const im=new Image();im.src=p;im.className=idx===0?'act':'';im.onclick=()=>go(idx);thumbs.appendChild(im);});}
function setImg(el,src){return new Promise(res=>{const im=new Image();im.onload=()=>{el.src=src;res();};im.onerror=res;im.src=src;});}
async function show(n,dir){if(n<0||n>=PAGES.length||flipping)return;flipping=true;ld.style.display='flex';
 if(scale>1){scale=1;apply();}
 if(dir>0){await setImg(bImg,PAGES[n]);flip.style.transform='rotateY(-180deg)';}
 else{await setImg(bImg,PAGES[n]);flip.style.transform='rotateY(180deg)';}
 setTimeout(()=>{fImg.src=PAGES[n];flip.style.transition='none';flip.style.transform='rotateY(0deg)';
  flip.offsetHeight;flip.style.transition='';i=n;update();flipping=false;ld.style.display='none';},630);
}
function go(n){if(n===i||flipping)return;show(n,n>i?1:-1);}
function next(){go(Math.min(i+1,PAGES.length-1));}
function prev(){go(Math.max(i-1,0));}
function update(){cur.textContent=i+1;prog.style.width=((i+1)/PAGES.length*100)+'%';
 [...thumbs.children].forEach((c,idx)=>c.classList.toggle('act',idx===i));
 thumbs.children[i]&&thumbs.children[i].scrollIntoView({inline:'center',block:'nearest'});}
function apply(){zw.style.transform=`scale(${scale})`;pan.style.transform=`translate(${panX}px,${panY}px)`;stage.style.cursor=scale>1?'grab':'';}
function setZoom(s){scale=Math.max(1,Math.min(4,s));if(scale===1){panX=panY=0;}apply();}
document.getElementById('zIn').onclick=()=>setZoom(scale+0.5);
document.getElementById('zOut').onclick=()=>setZoom(scale-0.5);
document.getElementById('fit').onclick=()=>{setZoom(1);};
document.getElementById('fs').onclick=()=>{if(!document.fullscreenElement){document.documentElement.requestFullscreen();}else{document.exitFullscreen();}};
document.getElementById('tThumbs').onclick=()=>{thumbs.classList.toggle('show');document.getElementById('tThumbs').classList.toggle('on',thumbs.classList.contains('show'));};
document.getElementById('edgeL').onclick=prev;
document.getElementById('edgeR').onclick=next;
fImg.addEventListener('dblclick',()=>setZoom(scale>1?1:2));
// pan
stage.addEventListener('pointerdown',e=>{if(scale===1)return;drag={x:e.clientX-panX,y:e.clientY-panY};stage.setPointerCapture(e.pointerId);stage.style.cursor='grabbing';});
stage.addEventListener('pointermove',e=>{if(!drag)return;panX=e.clientX-drag.x;panY=e.clientY-drag.y;apply();});
stage.addEventListener('pointerup',e=>{drag=null;apply();});
// touch swipe (when not zoomed)
let sx=null;stage.addEventListener('touchstart',e=>{if(scale===1&&e.touches.length===1)sx=e.touches[0].clientX;},{passive:true});
stage.addEventListener('touchend',e=>{if(sx===null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>50){dx<0?next():prev();}sx=null;},{passive:true});
// keyboard
document.addEventListener('keydown',e=>{const k=e.key;if(k==='ArrowRight'||k===' '){next();}else if(k==='ArrowLeft'){prev();}else if(k==='+'||k==='='){setZoom(scale+0.5);}else if(k==='-'){setZoom(scale-0.5);}else if(k.toLowerCase()==='f'){document.getElementById('fs').click();}else if(k.toLowerCase()==='t'){document.getElementById('tThumbs').click();}else if(k==='Home'){go(0);}else if(k==='End'){go(PAGES.length-1);}});
// init
(async()=>{await setImg(fImg,PAGES[0]);ld.style.display='none';update();loadThumbs();})();
</script>
</body>
</html>
